[visionTitle]
other = "Vision"

[visionStatement]
other = "A world where every person has the support, knowledge, and power to shape their health and wellbeing across every chapter of life."

[pillar1Title]
other = "We walk alongside people"

[pillar1Description]
other = "We meet people where they are — in their homes, neighbourhoods, and through the changes of everyday life. Through our multidisciplinary team of researchers, nurses, social workers, dietitians, and community care workers, we provide whole-person care that responds not only to symptoms, but also to the social, emotional, and practical realities that shape health."

[pillar2Title]
other = "We build community capacity"

[pillar2Description]
other = "We train and support community members to become trusted care partners, extending care into the everyday spaces and relationships where health is lived. By building local capacity, we help communities create stronger systems of support that last."

[pillar3Title]
other = "We pilot what works"

[pillar3Description]
other = "We design and test new ways of delivering community health care, learning from each step and refining what works in real life. Our goal is to develop models that can be adopted, adapted, and integrated into existing systems."

[pillar4Title]
other = "We build evidence for better care"

[pillar4Description]
other = "Our work is grounded in research and shaped by practice. We evaluate what we do, document what we learn, and turn that knowledge into better care for the communities we serve and the systems around them."

