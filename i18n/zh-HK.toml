[milestonesTitle]
other = "里程碑"

[heroDescription]
other = "健康籽是一個跨專業社區健康團隊。我們陪伴每一位街坊走過健康旅程，並在社區試行創新的服務模式，建立屬於香港人的基層醫療新生態。"

[visionTitle]
other = "願景"

[visionStatement]
other = "我們相信，每個人在任何人生階段，皆應獲得支援、知識及力量，以促進其身心健康。"

[pillar1Title]
other = "結伴同行"

[pillar1Description]
other = "本團隊從街坊的處境出發，走進其家庭、社區與日常生活的各種變動中，陪伴他們完成整個健康旅程。透過由學者、護士、社工、營養師及社區健康工作者組成的跨專業團隊，我們設計以人為本的照顧方案，不僅著眼於症狀本身，而關注如何形塑健康社會。"

[pillar2Title]
other = "裝備社區"

[pillar2Description]
other = "我們培訓並支援社區人士成為可靠的健康伙伴，將照顧延伸至日常生活與人際關係中。透過與社區共同成長，我們攜手築起更堅實而長遠的基層醫療系統。"

[pillar3Title]
other = "落地試驗"

[pillar3Description]
other = "我們設計不同的醫療服務模式，於社區實踐中持續學習，以找出最切合各社區需要的基層醫療方案，繼而整合至現行的醫療和社褔系統中。"

[pillar4Title]
other = "實證為本"

[pillar4Description]
other = "我們的工作以學術研究為基，透過與街坊同行的實踐中不斷形塑發展。團隊將用心記錄每個方案的服務成效，把知識轉化為行動 —— 從各地區的在地經驗出發，並深化及整理成切合其他社區的照顧模式，從而惠及整個醫療系統。"

